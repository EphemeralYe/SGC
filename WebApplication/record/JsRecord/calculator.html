<!DOCTYPE html>
<html>
<head>
</head>
<body>
	<input type="number" id="num1">
	<input type="text" maxlength=1 id="opr">
	<input type="number" id="num2">
	<input type="button" value="Submit" id="btn">
	<p id="out"><p>
<script>
	document.getElementById("btn").addEventListener("click", function(){
		let x=Number(document.getElementById("num1").value);
		let y=document.getElementById("opr").value;
		let z=Number(document.getElementById("num2").value);
		let otp;
		switch(y)
		{
			case "+":
				otp=x+z;
				break;
			case "-":
				otp=x-z;
				break;
			case "*":
				otp=x*z;
				break;
			case "/":
				otp=x/z;
				break;
		};
		document.getElementById("out").innerHTML="Result: " + otp;
	});
</script> 
</body>
</html>
