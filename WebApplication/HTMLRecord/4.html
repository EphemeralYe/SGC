<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Supermarket</title>
    <style>
        body {
            background: #DBE765;
            display: flex;
            justify-content: center;
            align-items: center;
            flex-direction: column;
            gap: 20px;
        }
        h1 {
            color: red;
        }
        h2 {
            color: green;
        }
        .product-card {
            background: white;
            border-radius: 8px;
            padding: 20px;
            width: 300px;
        }
    </style>
</head>
<body>
    <h1>Loid Super Market</h1>

    <div class="product-card">
        <h2>Vegetables Available</h2>
        <ul>
            <li>Tomato</li>
            <li>Carrot</li>
            <li>Onion</li>
            <li>Cucumber</li>
        </ul>
    </div>

    <div class="product-card">
        <h2>Fruits Available</h2>
        <ul>
            <li>Apple</li>
            <li>Orange</li>
            <li>Grapes</li>
            <li>Kiwi</li>
        </ul>
    </div>

    <div class="product-card">
        <h2>Grocery</h2>
        <ul>
            <li>Coconut Oil</li>
            <li>Rice</li>
            <li>Milk</li>
            <li>Others</li>
        </ul>
    </div>
</body>
</html>
